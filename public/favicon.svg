<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A5C"/>
      <stop offset="100%" style="stop-color:#0F2440"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4B366"/>
      <stop offset="100%" style="stop-color:#C4A35A"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Gold accent line top -->
  <rect x="96" y="80" width="320" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>
  <!-- O letter -->
  <text x="160" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="260" font-weight="bold" fill="url(#gold)" letter-spacing="-10">O</text>
  <!-- L letter -->
  <text x="300" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="260" font-weight="bold" fill="#FFFFFF" letter-spacing="-10">L</text>
  <!-- Gold accent line bottom -->
  <rect x="96" y="390" width="320" height="3" rx="1.5" fill="url(#gold)" opacity="0.6"/>
  <!-- Small text -->
  <text x="256" y="430" font-family="Arial, Helvetica, sans-serif" font-size="36" fill="url(#gold)" text-anchor="middle" letter-spacing="12" opacity="0.8">OFFICE</text>
</svg>
